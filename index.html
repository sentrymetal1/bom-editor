<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOM Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_simple.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
  body {
    margin: 0;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: #f4f6f8;
    color: #1A1D23;
    font-size: 13px;
  }
  .header {
    background: #5F94CE;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .stats {
    display: flex;
    gap: 0;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    overflow: hidden;
  }
  .stats .stat {
    padding: 7px 16px;
    border-right: 1px solid rgba(255,255,255,0.18);
    text-align: center;
  }
  .stats .stat:last-child { border-right: none; }
  .stats .stat .label { opacity: 0.8; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stats .stat .val { font-weight: 600; font-size: 14px; margin-top: 2px; }

  .toolbar {
    background: #fff;
    padding: 10px 24px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-ghost { background: #fff; color: #444; border: 1px solid #d0d0d0; }
  .btn-ghost:hover { background: #e8e8e8; }

  .view-toggle {
    display: inline-flex;
    background: #f0f0f0;
    border: 1px solid #d0d0d0;
    border-radius: 4px;
    padding: 2px;
    margin-left: 8px;
  }
  .view-toggle button {
    border: none;
    background: transparent;
    padding: 5px 12px;
    font-size: 11px;
    font-family: inherit;
    color: #444;
    cursor: pointer;
    border-radius: 3px;
    font-weight: 500;
  }
  .view-toggle button:hover { background: #e8e8e8; color: #1A1D23; }
  .view-toggle button.active { background: #5F94CE; color: #fff; }

  .filter-input {
    margin-left: auto;
    border: 1px solid #d0d0d0;
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 12px;
    width: 200px;
    font-family: inherit;
    color: #1A1D23;
  }
  .filter-input:focus { outline: none; border-color: #5F94CE; }

  #bom-table {
    margin: 14px 24px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
  }
  .tabulator { font-size: 12px; border: none; font-family: inherit; }
  .tabulator .tabulator-header { background: #fafbfc; border-bottom: 1px solid #d0d0d0; }
  .tabulator .tabulator-header .tabulator-col {
    background: #fafbfc;
    color: #555;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 10px;
    border-right: 1px solid #ececec;
  }
  .tabulator-row { border-bottom: 1px solid #f0f0f0; }
  .tabulator-row:hover { background: #e8e8e8 !important; }
  .tabulator-row.tabulator-row-even { background: #fafbfc; }
  .tabulator-cell { padding: 7px 10px !important; vertical-align: middle; border-right: 1px solid #f6f6f6; }

  .tabulator .tabulator-row.tabulator-group {
    background: #5F94CE !important;
    color: #fff;
    font-weight: 600;
    padding: 6px 12px;
    border: none;
    text-decoration: none !important;
  }
  .tabulator .tabulator-row.tabulator-group span { color: #fff !important; }

  .lookup-cell {
    background: #f4f7fb;
    border: 1px solid #e0e8f3;
    border-radius: 3px;
    padding: 2px 7px;
    display: inline-block;
    color: #1a4a82;
    font-weight: 500;
    font-size: 11px;
  }
  .calc-cell { color: #666; }
  .desc-cell { color: #444; font-size: 11px; }

  .footer-note {
    text-align: center;
    padding: 14px;
    font-size: 11px;
    color: #888;
  }

  .tabulator-cell.editable-cell {
    background: #fffae6;
    cursor: pointer;
  }
  .tabulator-cell.editable-cell:hover { background: #fff1a8; }

  .tabulator-row.row-edited { box-shadow: inset 3px 0 0 0 #5F94CE; }
  .tabulator-row.row-deleted .tabulator-cell {
    color: #888 !important;
    text-decoration: line-through;
  }
  .tabulator-row.row-deleted { background: #fafafa !important; opacity: 0.7; }
  .tabulator-row.row-deleted:hover { opacity: 0.85; }

  .row-action-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 3px;
    padding: 2px 8px;
    font: 500 11px inherit;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-decoration: none !important;
  }
  .row-action-btn.delete  { color: #bc0f0f; }
  .row-action-btn.restore { color: #2f7d3b; }
  .row-action-btn:hover { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); }
  .row-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost.active { background: #e8e8e8; border-color: #b0b0b0; }

  .btn-primary {
    background: #5F94CE;
    color: #fff;
    border: 1px solid #4a7eb8;
  }
  .btn-primary:hover  { background: #4a7eb8; }
  .btn-primary:disabled {
    background: #cdd5df;
    border-color: #cdd5df;
    color: #fff;
    cursor: not-allowed;
  }
  .btn-primary .spinner { border-color: rgba(255,255,255,0.4); border-top-color: #fff; }

  .grid-lock {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(1px);
    z-index: 9000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-size: 13px;
    color: #1A1D23;
    font-weight: 500;
  }
  .grid-lock.show { display: flex; }
  .grid-lock .big-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #d0d0d0;
    border-top-color: #5F94CE;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes flashGreen {
    0%   { background-color: #cdeccd; }
    100% { background-color: transparent; }
  }
  @keyframes flashRed {
    0%   { background-color: #f5c8c8; }
    100% { background-color: transparent; }
  }
  .tabulator-row.flash-success { animation: flashGreen 1.2s ease-out; }
  .tabulator-row.flash-error   { animation: flashRed   1.2s ease-out; }

  .toast {
    position: fixed;
    top: 20px;
    right: 24px;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 9999;
    max-width: 360px;
  }
  .toast.show    { opacity: 1; }
  .toast.success { background: #2f7d3b; }
  .toast.error   { background: #bc0f0f; }

  .state-msg {
    margin: 40px 24px;
    padding: 20px;
    text-align: center;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    font-size: 13px;
    color: #555;
  }
  .state-msg.error {
    border-left: 4px solid #bc0f0f;
    color: #6e1414;
    text-align: left;
    font-family: 'DM Sans', monospace;
    white-space: pre-wrap;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #d0d0d0;
    border-top-color: #5F94CE;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="header-title">BOM EDITOR</h1>
    <div class="sub" id="header-sub">Loading project context...</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="label">Rows</div>
      <div class="val" id="stat-rows">—</div>
    </div>
    <div class="stat">
      <div class="label">Total Weight</div>
      <div class="val" id="stat-weight">—</div>
    </div>
    <div class="stat">
      <div class="label">Allocated $</div>
      <div class="val" id="stat-dollars">—</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-ghost" id="back">← Back to Project</button>
  <div class="view-toggle">
    <button id="view-flat" class="active">Flat</button>
    <button id="view-grouped">Grouped</button>
  </div>
  <button class="btn btn-ghost" id="toggle-hide-deleted" title="Hide rows marked for deletion">Hide deleted</button>
  <input type="text" class="filter-input" id="filter-input" placeholder="Filter rows...">
  <button class="btn btn-primary" id="save-project" disabled title="Commit pending changes and recalculate project totals">Save to Project</button>
</div>

<div id="loading" class="state-msg"><span class="spinner"></span>Loading BOM rows...</div>
<div id="error" class="state-msg error" style="display:none;"></div>
<div id="bom-table" style="display:none;"></div>

<div class="footer-note">
  <span id="build-tag-display">v2.3</span> — Spec + Material fetched per Form+MatType combo (filtered server-side, ~20-200 rows each). Replaces v2.2's 10k preload that hit cap.
</div>

<div id="toast" class="toast"></div>

<div id="grid-lock" class="grid-lock">
  <div class="big-spinner"></div>
  <div id="grid-lock-msg">Saving to project & recalculating totals…</div>
</div>

<script>
const BUILD_TAG = "v2.3 (2026-05-21)";
console.log('[BOM Editor] build:', BUILD_TAG);

const APP_NAME            = "type-formsheet-2-18-21";
const REPORT_NAME         = "Project_Bill_Of_Material_Detail_Form_Report";
const PROJECT_REPORT_NAME = "All_Mcp_customer_Projects";
const PORTAL_BASE         = "https://customer.materialcompassportal.com";

let projectId      = null;
let manufactureId  = null;
let bomData        = [];
let table          = null;
let currentView    = 'flat';
let hideDeleted    = false;
const recentlyEdited = new Set();
const pendingCells   = new Set();

function cellKey(cell) {
  return cell.getRow().getData().id + '|' + cell.getColumn().getField();
}

const LOOKUP_INCH         = 'All_Length_Inch_Lookups';
const LOOKUP_PLATE_FT_W   = 'All_Plate_Standard_Sizes';
const LOOKUP_FORM_TYPE    = 'Form_Types_Report';
const LOOKUP_MAT_TYPE     = 'Material_Types_Report';
const LOOKUP_MFD          = 'Material_Form_Detail_Report';
const LOOKUP_MATERIAL     = 'Beam_Channel_Tee_Lookup_Report';
const lookupCache = {
  [LOOKUP_INCH]:       { byId: {}, displayField: null, optionsList: [] },
  [LOOKUP_PLATE_FT_W]: { byId: {}, displayField: null, optionsList: [] },
  [LOOKUP_FORM_TYPE]:  { byId: {}, optionsList: [] },
  [LOOKUP_MAT_TYPE]:   { byId: {}, optionsList: [] },
  [LOOKUP_MFD]:        { byId: {}, records: [] },
  [LOOKUP_MATERIAL]:   { byId: {}, records: [] },
};

// Per-combo cache for spec + material dropdowns. Keyed by "formTypeId|matTypeId".
// Populated on demand via /api/bom-lookups/material-form-detail and /api/bom-lookups/materials
// with form_type_id + material_type_id query params. Avoids preloading 100k+ rows.
const comboCache = {};
function comboKey(formTypeId, matTypeId) {
  return (formTypeId || '') + '|' + (matTypeId || '');
}
async function ensureComboLoaded(formTypeId, matTypeId) {
  if (!formTypeId || !matTypeId) return null;
  const key = comboKey(formTypeId, matTypeId);
  if (comboCache[key]) return comboCache[key];
  comboCache[key] = { specs: [], materials: [], loading: true };
  try {
    const qs = '?form_type_id=' + encodeURIComponent(formTypeId) + '&material_type_id=' + encodeURIComponent(matTypeId);
    const [specRows, matRows] = await Promise.all([
      fetchRailwayLookup('/api/bom-lookups/material-form-detail' + qs),
      fetchRailwayLookup('/api/bom-lookups/materials' + qs),
    ]);
    const specs = specRows.map(r => ({label: String(r.typeDetail ?? ''), value: String(r.id)}))
      .sort((a, b) => a.label.localeCompare(b.label, undefined, {numeric: true}));
    const materials = matRows.map(r => ({label: String(r.description ?? ''), value: String(r.id)}))
      .sort((a, b) => a.label.localeCompare(b.label, undefined, {numeric: true}));
    comboCache[key] = { specs, materials, loading: false };
    // Mirror into lookupCache byId so existing formatters keep working
    for (const r of specRows) lookupCache[LOOKUP_MFD].byId[String(r.id)] = String(r.typeDetail ?? '');
    for (const r of matRows)  lookupCache[LOOKUP_MATERIAL].byId[String(r.id)] = String(r.description ?? '');
    console.log('[BOM Editor] combo', key, '→', specs.length, 'specs,', materials.length, 'materials');
    return comboCache[key];
  } catch (err) {
    console.error('[BOM Editor] combo load failed', key, err);
    delete comboCache[key];
    return null;
  }
}

const SYSTEM_FIELD_PREFIXES = ['ID', 'Added_Time', 'Added_User', 'Modified_Time', 'Modified_User', 'zc_'];
function pickDisplayField(record) {
  for (const key of Object.keys(record)) {
    if (SYSTEM_FIELD_PREFIXES.some(p => key === p || key.startsWith(p))) continue;
    const val = record[key];
    if (typeof val === 'string' && val.trim() !== '') return key;
    if (typeof val === 'number') return key;
  }
  return null;
}

function readLookupId(field) {
  if (field === null || field === undefined || field === '') return '';
  if (typeof field === 'object') return String(field.ID || field.id || '');
  return String(field);
}

function lookupDisplay(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'object') return v.display_value ?? '';
  return v;
}

function getTagPrefix(tag) {
  if (!tag) return '(no tag)';
  const parts = String(tag).split('-');
  if (parts.length >= 3 && /^\d+$/.test(parts[1])) return parts[0] + '-' + parts[1];
  return parts[0];
}

function mapRecord(r, idx) {
  return {
    id:           r.ID,
    recordId:     r.ID,
    lineItem:     Number(r.Line_Item) || idx + 1,
    tag:          r.BOM_Item || '',
    component:    lookupDisplay(r.Component),
    drawing:      lookupDisplay(r.Scope_LU),
    formType:     readLookupId(r.Form_Type),
    formTypeLbl:  lookupDisplay(r.Form_Type),
    matType:      readLookupId(r.Material_Type),
    matTypeLbl:   lookupDisplay(r.Material_Type),
    spec:         readLookupId(r.Specification),
    specLbl:      lookupDisplay(r.Specification),
    material:     readLookupId(r.Material),
    materialLbl:  lookupDisplay(r.Material),
    qty:          Number(r.Quantity) || 0,
    ftL:          Number(r.Length_FT) || 0,
    inchL:        readLookupId(r.Length_INCH),
    ftW:          readLookupId(r.Width_FT),
    inchW:        readLookupId(r.Width_INCH),
    materialDesc: r.Material_Description_And_Dimension || '',
    unitWt:       Number(r.Unit_Weight) || 0,
    totWt:        Number(r.CalcWeight) || 0,
    area:         Number(r.Area) || 0,
    sa:           r.Plate_SA === true || r.Plate_SA === 'true',
    galv:         r.Galv === true || r.Galv === 'true',
    galvLb:       Number(r.Galv_LB) || 0,
    supplied:     lookupDisplay(r.Supplied),
    finish:       lookupDisplay(r.Finish),
    allocatedAmt: Number(r.Total_Allotted_Line_Amount) || 0,
    assemblyGroup: getTagPrefix(r.BOM_Item),
    deleted:      r.DELETE_field === true || r.DELETE_field === 'true',
  };
}

let toastTimer = null;
function showToast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind || 'success');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

function flashRow(row, kind) {
  const el = row.getElement();
  el.classList.remove('flash-success', 'flash-error');
  void el.offsetWidth;
  el.classList.add(kind === 'error' ? 'flash-error' : 'flash-success');
}

const nonNegNumber = v => Number.isFinite(Number(v)) && Number(v) >= 0;
const boolToApi    = v => String(Boolean(v));

async function refetchAndUpdateRow(row, recordId) {
  const resp = await ZOHO.CREATOR.API.getRecordById({
    appName:    APP_NAME,
    reportName: REPORT_NAME,
    id:         recordId
  });
  if (!resp || (resp.code !== 3000 && !resp.data)) {
    throw new Error('Bad refetch response: ' + JSON.stringify(resp));
  }
  const recordData = resp.data;
  if (!recordData || typeof recordData !== 'object') {
    throw new Error('Unexpected getRecordById data: ' + JSON.stringify(resp));
  }
  const lineItem = row.getData().lineItem;
  const fresh    = mapRecord(recordData, lineItem - 1);
  const idx      = bomData.findIndex(r => r.id === recordId);
  if (idx >= 0) bomData[idx] = fresh;
  row.update(fresh);
  updateStats();
}

function updateSaveButtonState() {
  const btn = document.getElementById('save-project');
  const n   = recentlyEdited.size;
  btn.disabled    = n === 0;
  btn.textContent = n === 0 ? 'Save to Project' : `Save to Project (${n})`;
}

async function commitChanges() {
  if (recentlyEdited.size === 0) return;

  const btn  = document.getElementById('save-project');
  const lock = document.getElementById('grid-lock');
  btn.disabled = true;
  lock.classList.add('show');

  // Snapshot which rows were marked for delete BEFORE the commit,
  // so we can detect ones that survived (allocations block hard-delete)
  const beforeMarked = new Set(bomData.filter(r => r.deleted).map(r => r.id));

  try {
    const resp = await ZOHO.CREATOR.API.updateRecord({
      appName:    APP_NAME,
      reportName: PROJECT_REPORT_NAME,
      id:         projectId,
      data:       { data: { BOM_Recalc_Trigger: Math.floor(Date.now() / 1000) % 10000 } }
    });
    if (!resp || (resp.code !== 3000 && !resp.result)) {
      throw new Error('Bad response: ' + JSON.stringify(resp));
    }

    // Workflow #9 may have hard-deleted orphans; reload everything.
    await loadBOM();

    // Detect rows that were marked but survived (allocations blocked delete).
    const afterMarked = new Set(bomData.filter(r => r.deleted).map(r => r.id));
    const survived    = [...beforeMarked].filter(id => afterMarked.has(id));

    recentlyEdited.clear();
    updateSaveButtonState();

    if (survived.length > 0) {
      showToast(
        `Saved. ${survived.length} row(s) marked for delete stayed because they have allocated material. Clear allocations first to remove them.`,
        'success'
      );
    } else {
      showToast('Saved to project. Totals recalculated.', 'success');
    }
  } catch (err) {
    const detail = err?.responseText || err?.message || JSON.stringify(err);
    showToast('Save to project failed: ' + detail, 'error');
    console.error('[BOM Editor] commitChanges failed', err);
    updateSaveButtonState();
  } finally {
    lock.classList.remove('show');
  }
}

async function toggleDelete(row, makeDeleted) {
  const data    = row.getData();
  const apiVal  = String(makeDeleted);
  const verb    = makeDeleted ? 'Marked for delete' : 'Restored';

  try {
    const resp = await ZOHO.CREATOR.API.updateRecord({
      appName:    APP_NAME,
      reportName: REPORT_NAME,
      id:         data.id,
      data:       { data: { DELETE_field: apiVal } }
    });
    if (!resp || (resp.code !== 3000 && !resp.result)) {
      throw new Error('Bad response: ' + JSON.stringify(resp));
    }

    try {
      await refetchAndUpdateRow(row, data.id);
    } catch (refetchErr) {
      console.warn('[BOM Editor] Save OK but refetch failed:', refetchErr);
      const item = bomData.find(r => r.id === data.id);
      if (item) item.deleted = makeDeleted;
      row.update({deleted: makeDeleted});
    }

    recentlyEdited.add(data.id);
    row.reformat();
    updateSaveButtonState();
    flashRow(row, 'success');
    showToast(`${verb} row ${data.lineItem}.`, 'success');
  } catch (err) {
    flashRow(row, 'error');
    const detail = err?.responseText || err?.message || JSON.stringify(err);
    showToast('Action failed: ' + detail, 'error');
    console.error('[BOM Editor] toggleDelete failed', err);
  }
}

function makeEditHandler(fieldLinkName, dataKey, opts) {
  opts = opts || {};
  return async function(cell) {
    const key = cellKey(cell);
    if (pendingCells.has(key)) return;
    const row    = cell.getRow();
    const data   = row.getData();
    const rawNew = cell.getValue() ?? '';
    const rawOld = cell.getOldValue() ?? '';
    if (rawNew === rawOld) return;

    if (opts.validate && !opts.validate(rawNew)) {
      showToast('Invalid value for ' + (opts.label || fieldLinkName) + '. Row not saved — re-edit to fix.', 'error');
      flashRow(row, 'error');
      return;
    }

    const apiValue = opts.toApi ? opts.toApi(rawNew) : rawNew;
    pendingCells.add(key);

    try {
      const resp = await ZOHO.CREATOR.API.updateRecord({
        appName:    APP_NAME,
        reportName: REPORT_NAME,
        id:         data.id,
        data:       { data: { [fieldLinkName]: apiValue } }
      });
      if (!resp || (resp.code !== 3000 && !resp.result)) {
        throw new Error('Bad response: ' + JSON.stringify(resp));
      }

      try {
        await refetchAndUpdateRow(row, data.id);
      } catch (refetchErr) {
        console.warn('[BOM Editor] Save OK but refetch failed:', refetchErr);
        const item = bomData.find(r => r.id === data.id);
        if (item) item[dataKey] = rawNew;
        updateStats();
      }

      recentlyEdited.add(data.id);
      row.reformat();
      updateSaveButtonState();
      flashRow(row, 'success');
      showToast(`Saved ${opts.label || fieldLinkName} on row ${data.lineItem}.`, 'success');
    } catch (err) {
      flashRow(row, 'error');
      const detail = err?.responseText || err?.message || JSON.stringify(err);
      showToast('Save failed: ' + detail + ' — re-edit to retry.', 'error');
      console.error('[BOM Editor] updateRecord failed', err);
    } finally {
      pendingCells.delete(key);
    }
  };
}

function makeCascadeEditHandler(fieldLinkName, dataKey, downstream, opts) {
  opts = opts || {};
  return async function(cell) {
    const key = cellKey(cell);
    if (pendingCells.has(key)) return;
    const row    = cell.getRow();
    const data   = row.getData();
    const rawNew = cell.getValue() ?? '';
    const rawOld = cell.getOldValue() ?? '';
    if (rawNew === rawOld) return;

    const payload = { [fieldLinkName]: rawNew || '' };
    const clearedDataKeys = [];
    for (const ds of downstream) {
      if (data[ds.dataKey]) {
        payload[ds.fieldLinkName] = '';
        clearedDataKeys.push(ds.dataKey);
      }
    }

    pendingCells.add(key);
    try {
      const resp = await ZOHO.CREATOR.API.updateRecord({
        appName:    APP_NAME,
        reportName: REPORT_NAME,
        id:         data.id,
        data:       { data: payload }
      });
      if (!resp || (resp.code !== 3000 && !resp.result)) {
        throw new Error('Bad response: ' + JSON.stringify(resp));
      }

      try {
        await refetchAndUpdateRow(row, data.id);
      } catch (refetchErr) {
        console.warn('[BOM Editor] Save OK but refetch failed:', refetchErr);
        const item = bomData.find(r => r.id === data.id);
        if (item) {
          item[dataKey] = rawNew;
          for (const k of clearedDataKeys) item[k] = '';
        }
        const localPatch = {[dataKey]: rawNew};
        for (const k of clearedDataKeys) localPatch[k] = '';
        row.update(localPatch);
        updateStats();
      }

      recentlyEdited.add(data.id);
      row.reformat();
      updateSaveButtonState();
      flashRow(row, 'success');
      const tail = clearedDataKeys.length ? ` (cleared ${clearedDataKeys.length} downstream field${clearedDataKeys.length>1?'s':''})` : '';
      showToast(`Saved ${opts.label || fieldLinkName} on row ${data.lineItem}${tail}.`, 'success');
      // Pre-fetch the new Form+MatType combo's specs+materials so the next dropdown is ready.
      if (dataKey === 'formType' || dataKey === 'matType') {
        const fresh = row.getData();
        if (fresh.formType && fresh.matType) {
          ensureComboLoaded(fresh.formType, fresh.matType).then(() => row.reformat());
        }
      }
    } catch (err) {
      flashRow(row, 'error');
      const detail = err?.responseText || err?.message || JSON.stringify(err);
      showToast('Save failed: ' + detail + ' — re-edit to retry.', 'error');
      console.error('[BOM Editor] cascade updateRecord failed', err);
    } finally {
      pendingCells.delete(key);
    }
  };
}

function showError(msg, err) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('bom-table').style.display = 'none';
  const el = document.getElementById('error');
  el.style.display = 'block';
  el.textContent = msg + (err ? '\n\n' + (err.message || JSON.stringify(err, null, 2)) : '');
  console.error('[BOM Editor]', msg, err);
}

async function loadOneLookup(reportName) {
  const resp = await ZOHO.CREATOR.API.getAllRecords({
    appName:    APP_NAME,
    reportName: reportName,
    pageSize:   200
  });
  const rows = Array.isArray(resp?.data) ? resp.data : Array.isArray(resp) ? resp : [];
  if (rows.length === 0) {
    console.warn('[BOM Editor] Lookup', reportName, 'returned 0 rows');
    return;
  }
  const displayField = pickDisplayField(rows[0]);
  if (!displayField) {
    console.error('[BOM Editor] Could not auto-detect display field for', reportName, '— record keys:', Object.keys(rows[0]));
    return;
  }
  console.log('[BOM Editor] Lookup', reportName, 'using display field:', displayField);

  const cache = lookupCache[reportName];
  cache.displayField = displayField;
  cache.byId        = {};
  cache.optionsList = [];
  for (const r of rows) {
    const id  = String(r.ID);
    const lbl = String(r[displayField] ?? '');
    cache.byId[id] = lbl;
    cache.optionsList.push({label: lbl, value: id});
  }
  cache.optionsList.sort((a, b) => a.label.localeCompare(b.label, undefined, {numeric: true}));
}

async function fetchAllPages(reportName, criteria) {
  const all = [];
  let page = 1;
  const pageSize = 1000;
  while (true) {
    const params = { appName: APP_NAME, reportName: reportName, page: page, pageSize: pageSize };
    if (criteria) params.criteria = criteria;
    const resp = await ZOHO.CREATOR.API.getAllRecords(params);
    const rows = Array.isArray(resp?.data) ? resp.data : Array.isArray(resp) ? resp : [];
    if (rows.length === 0) break;
    all.push(...rows);
    if (rows.length < pageSize) break;
    page += 1;
    if (page > 50) {
      console.warn('[BOM Editor] fetchAllPages safety stop at page 50 for', reportName);
      break;
    }
  }
  return all;
}

async function loadLookups() {
  await Promise.all([
    loadOneLookup(LOOKUP_INCH).catch(err          => console.error('[BOM Editor]', LOOKUP_INCH, 'fetch failed:', err)),
    loadOneLookup(LOOKUP_PLATE_FT_W).catch(err    => console.error('[BOM Editor]', LOOKUP_PLATE_FT_W, 'fetch failed:', err)),
    loadFormTypes().catch(err                     => console.error('[BOM Editor]', LOOKUP_FORM_TYPE, 'fetch failed:', err)),
    loadMaterialTypes().catch(err                 => console.error('[BOM Editor]', LOOKUP_MAT_TYPE, 'fetch failed:', err)),
  ]);
  // material-form-detail + materials are NOT preloaded — they're huge (>10k rows total
  // across all form types). Instead they're fetched on demand per Form+MatType combo via
  // ensureComboLoaded — see preloadCombosFromBOM() called after BOM rows render.
}

async function preloadCombosFromBOM() {
  if (!Array.isArray(bomData)) return;
  const seen = new Set();
  const combos = [];
  for (const row of bomData) {
    if (row.formType && row.matType) {
      const k = comboKey(row.formType, row.matType);
      if (!seen.has(k)) { seen.add(k); combos.push([row.formType, row.matType]); }
    }
  }
  if (!combos.length) return;
  console.log('[BOM Editor] preloading', combos.length, 'Form+MatType combo(s) for current BOM');
  await Promise.all(combos.map(([f, m]) => ensureComboLoaded(f, m)));
  // Refresh cells so existing Spec/Material labels resolve from newly populated byId cache
  if (table) table.redraw(true);
}

async function loadBOM() {
  try {
    const [resp] = await Promise.all([
      ZOHO.CREATOR.API.getAllRecords({
        appName:    APP_NAME,
        reportName: REPORT_NAME,
        criteria:   `MCP_Customer_Project_Form == ${projectId}`,
        pageSize:   200
      }),
      loadLookups()
    ]);

    const rows = Array.isArray(resp?.data) ? resp.data
              : Array.isArray(resp)        ? resp
              : [];

    bomData = rows.map(mapRecord).sort((a, b) => a.lineItem - b.lineItem);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('bom-table').style.display = 'block';
    renderGrid();
    preloadCombosFromBOM().catch(err => console.error('[BOM Editor] preloadCombosFromBOM failed:', err));
  } catch (err) {
    showError('Failed to load BOM rows.', err);
  }
}

function applyView(view) {
  if (!table) return;
  currentView = view;
  document.getElementById('view-flat').classList.toggle('active', view === 'flat');
  document.getElementById('view-grouped').classList.toggle('active', view === 'grouped');
  if (view === 'grouped') {
    table.setGroupBy('assemblyGroup');
    table.setGroupHeader(function(value, count, data) {
      const groupWt = data.reduce((s,r) => s + (r.totWt || 0), 0);
      return `${value} &nbsp;<span style="opacity:0.85; font-weight:400; font-size:11px;">— ${count} rows, ${Math.round(groupWt).toLocaleString()} lbs</span>`;
    });
  } else {
    table.setGroupBy(false);
  }
}

function applyAllFilters() {
  if (!table) return;
  const text = (document.getElementById('filter-input').value || '').toLowerCase().trim();
  table.setFilter((data) => {
    if (hideDeleted && data.deleted) return false;
    if (!text) return true;
    const hay = [data.tag, data.component, data.material, data.materialDesc, data.assemblyGroup]
      .filter(Boolean).join(' ').toLowerCase();
    return hay.includes(text);
  });
}

document.getElementById('filter-input').addEventListener('input', applyAllFilters);

  hideDeleted = !hideDeleted;

});

ZOHO.CREATOR.init().then(function() {
  const params = ZOHO.CREATOR.UTIL.getQueryParams();
  projectId     = params.project_id;
  manufactureId = params.Manufacture_ID;

  if (!projectId) {
    showError('Missing required URL param: project_id', null);
    return;
  }

  document.getElementById('header-title').textContent = 'BOM EDITOR — Project ' + projectId;
  document.getElementById('header-sub').textContent =
    manufactureId ? ('Manufacture ID: ' + manufactureId) : 'No Manufacture ID in URL';

  loadBOM();
}).catch(function(err) {
  showError('ZOHO.CREATOR.init() failed.', err);
});
</script>
